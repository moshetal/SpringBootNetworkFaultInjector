# Maven Wrapper properties
# This file configures which Maven distribution and wrapper version to use.
# It is used by the mvnw / mvnw.cmd scripts to download Maven automatically
# if it is not already installed on the system.

# Maven distribution to use
# See: https://maven.apache.org/download.cgi
# Choose a binary without sources/docs to keep downloads smaller
# Latest 3.9.x at time of writing; adjust as needed for your project
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.6/apache-maven-3.9.6-bin.zip

# Maven Wrapper JAR to bootstrap the wrapper
# See: https://repo.maven.apache.org/maven2/org/apache/maven/wrapper/maven-wrapper/3.2.0/
wrapperUrl=https://repo.maven.apache.org/maven2/org/apache/maven/wrapper/maven-wrapper/3.2.0/maven-wrapper-3.2.0.jar
