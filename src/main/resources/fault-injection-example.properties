# Example configuration using application.properties syntax.
# Place in src/main/resources/application.properties of your application.

# Enable the fault injection features globally.
fault.injection.enabled=true

# Fallbacks used whenever a rule omits a field.
fault.injection.defaults.delay-ms=0
fault.injection.defaults.error-status=503
fault.injection.defaults.error-message=Injected fault
fault.injection.defaults.mode=PROBABILITY
fault.injection.defaults.probability=0.0
fault.injection.defaults.every-n=0

# Rule 0: probability-based latency on the billing host.
fault.injection.rules[0].name=slow-billing-api
fault.injection.rules[0].host-pattern=api\\.billing\\.example\\.com
fault.injection.rules[0].methods=GET,POST
fault.injection.rules[0].fault=DELAY
fault.injection.rules[0].mode=PROBABILITY
fault.injection.rules[0].probability=0.10
fault.injection.rules[0].delay-ms=750

# Rule 1: deterministic 503 on every 5th matching call.
fault.injection.rules[1].name=flaky-search
fault.injection.rules[1].url-pattern=.*/search/.*
fault.injection.rules[1].fault=ERROR
fault.injection.rules[1].mode=EVERY_N
fault.injection.rules[1].every-n=5
fault.injection.rules[1].error-status=503
